<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Canvas Tracker{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; color: #1a1a1a; background: #f5f5f5; }

    header {
      background: #c0392b;
      color: #fff;
      padding: 0.7rem 1.5rem;
    }
    header a.brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.05rem; }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

    .flash-list { list-style: none; margin-bottom: 1rem; }
    .flash-list li {
      padding: 0.65rem 1rem;
      border-radius: 4px;
      background: #fff3cd;
      border: 1px solid #e0a800;
      margin-bottom: 0.5rem;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<svg style="display:none">
  <symbol id="ico-msg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3h12v8H9l-3 2v-2H2z"/>
  </symbol>
  <symbol id="ico-disc" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="8" cy="6" r="3.5"/>
    <path d="M2 14c0-2.5 2.7-4 6-4s6 1.5 6 4"/>
  </symbol>
</svg>

  {% block nav %}
  <header>
    <a class="brand" href="{{ url_for('dashboard.index') }}">Canvas Tracker</a>
  </header>
  {% endblock %}

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-list">
          {% for msg in messages %}<li>{{ msg }}</li>{% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
